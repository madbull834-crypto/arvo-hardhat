<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for Depth -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1c1c" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </radialGradient>

    <!-- Premium Metallic Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dfba6b" />
      <stop offset="30%" stop-color="#f2d787" />
      <stop offset="50%" stop-color="#b88e3c" />
      <stop offset="85%" stop-color="#e9cc7b" />
      <stop offset="100%" stop-color="#916c24" />
    </linearGradient>
    
    <!-- Drop Shadow for 3D Effect -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Round Background Badge -->
  <circle cx="250" cy="250" r="240" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="3" />

  <!-- Main Logo Group with Shadow -->
  <g filter="url(#dropShadow)">
    
    <!-- The Upward Trend Arrow -->
    <path d="M 197 203 
             L 235 152 
             L 260 180 
             L 297 122 
             L 282 117 
             L 315 102 
             L 311 138 
             L 299 133 
             L 261 193 
             L 237 166 
             L 204 210 
             Z" 
          fill="url(#goldGrad)" />

    <!-- "ARVO" Typography (Serif Style) -->
    <text x="250" y="295" 
          font-family="'Cinzel', 'Times New Roman', 'Playfair Display', serif" 
          font-size="64" 
          font-weight="bold" 
          letter-spacing="2" 
          text-anchor="middle" 
          fill="url(#goldGrad)">ARVO</text>

    <!-- Subtitle: "FUTURE" -->
    <text x="250" y="340" 
          font-family="'Montserrat', 'Helvetica', 'Arial', sans-serif" 
          font-size="20" 
          font-weight="600" 
          letter-spacing="9" 
          text-anchor="middle" 
          fill="url(#goldGrad)">FUTURE</text>

    <!-- Subtitle: "BEGINS HERE" -->
    <text x="254" y="375" 
          font-family="'Montserrat', 'Helvetica', 'Arial', sans-serif" 
          font-size="19" 
          font-weight="500" 
          letter-spacing="5" 
          text-anchor="middle" 
          fill="url(#goldGrad)">BEGINS HERE</text>
          
  </g>
</svg>
